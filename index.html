<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sizzle & Drizzle | Harvard Medical-Grade Cuisine</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;800&family=Playfair+Display:wght@700&display=swap" rel="stylesheet">

    <style>
        :root {
            --harvard-crimson: #A51C30;
            --slate-gray: #333E48;
            --medical-blue: #007bff;
            --soft-bg: #f8f9fa;
        }

        body { font-family: 'Inter', sans-serif; margin: 0; background-color: var(--soft-bg); color: var(--slate-gray); }

        /* --- Navigation --- */
        .main-nav { 
            background: white; padding: 15px 5%; display: flex; 
            justify-content: space-between; align-items: center; 
            position: sticky; top: 0; z-index: 1000; border-bottom: 3px solid var(--harvard-crimson);
        }
        .logo { font-family: 'Playfair Display', serif; font-size: 1.5rem; color: var(--harvard-crimson); text-decoration: none; font-weight: 700; }
        .nav-links a { text-decoration: none; color: var(--slate-gray); font-weight: 600; margin-left: 30px; }

        .promo-banner { background: #fff3cd; padding: 10px; text-align: center; font-size: 0.85rem; font-weight: 600; }

        /* --- Layout --- */
        .main-content {
            display: grid; grid-template-columns: 1fr 380px; gap: 40px;
            max-width: 1400px; margin: 0 auto; padding: 40px 5%;
        }

        @media (max-width: 1100px) { .main-content { grid-template-columns: 1fr; } }

        /* --- Menu Cards --- */
        #menu-container { min-height: 400px; }
        .menu-section-title { font-family: 'Playfair Display', serif; font-size: 1.8rem; margin: 30px 0; border-left: 5px solid var(--harvard-crimson); padding-left: 15px; }
        .items-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(280px, 1fr)); gap: 25px; }
        .item-card { background: white; padding: 25px; border-radius: 16px; box-shadow: 0 10px 20px rgba(0,0,0,0.05); border: 1px solid #eee; display: flex; flex-direction: column; }

        /* --- Nutrient Tags (修正緊貼問題) --- */
        .nutrient-container { display: flex; flex-wrap: wrap; gap: 6px; margin: 12px 0; }
        .nutrient-tag { background: #eef2f7; color: #475569; font-size: 10px; font-weight: 700; padding: 3px 8px; border-radius: 12px; display: inline-flex; align-items: center; }
        .nutrient-tag::before { content: "•"; color: var(--medical-blue); margin-right: 4px; }

        /* --- Sidebar --- */
        .order-sidebar { position: sticky; top: 100px; height: fit-content; background: white; padding: 30px; border-radius: 20px; box-shadow: 0 10px 30px rgba(0,0,0,0.08); border-top: 5px solid var(--medical-blue); }
        .info-input { width: 100%; padding: 12px; border: 1px solid #ddd; border-radius: 8px; margin-top: 8px; box-sizing: border-box; }
        #summary-text { background: #f9f9f9; padding: 15px; border-radius: 8px; font-family: monospace; font-size: 0.85rem; margin: 20px 0; white-space: pre-wrap; }
        .submit-btn { width: 100%; padding: 18px; background: var(--harvard-crimson); color: white; border: none; border-radius: 10px; font-weight: 800; cursor: pointer; }
        .add-btn { background: var(--slate-gray); color: white; border: none; padding: 10px 15px; border-radius: 6px; cursor: pointer; font-weight: bold; }

    </style>
</head>
<body>

    <nav class="main-nav">
        <a href="index.html" class="logo">Sizzle & Drizzle</a>
        <div class="nav-links">
            <a href="index.html">Daily Menu</a>
            <a href="science.html">The Science</a>
        </div>
    </nav>

    <div class="promo-banner">
        🎓 <strong>Harvard Community:</strong> Settle payment at pickup for <strong>10% OFF</strong>.
    </div>

    <div class="main-content">
        <div id="menu-area">
            <h1 style="font-family: 'Playfair Display'; font-size: 2.2rem;">Precision Nutrition</h1>
            <div id="menu-container">
                <p style="text-align: center; padding: 50px; color: #999;">Connecting to Database...</p>
            </div>
        </div>

        <aside class="order-sidebar" id="group-order-summary">
            <h2 style="font-family: 'Playfair Display'; margin-top: 0;">Your Order</h2>
            <div id="empty-cart-msg" style="text-align: center; padding: 20px; color: #999;">
                <img src="https://cdn-icons-png.flaticon.com/512/11329/11329960.png" width="50" style="opacity: 0.3; margin-bottom: 10px;"><br>
                Your medical meal plan is empty.
            </div>
            
            <div id="order-form-content" style="display: none;">
                <label style="font-size: 0.7rem; font-weight: 800; color: #888;">IDENTIFICATION</label>
                <input type="text" id="cust-id" class="info-input" placeholder="Name / Harvard ID">
                <input type="tel" id="cust-phone" class="info-input" placeholder="Contact Phone" style="margin-top: 10px;">
                <pre id="summary-text"></pre>
                <button id="submit-btn" onclick="window.submitOrder()" class="submit-btn">PLACE ORDER</button>
            </div>
        </aside>
    </div>

    <script type="module" src="js/menu.js"></script>
    <script type="module" src="js/cart.js"></script>
</body>
</html>
