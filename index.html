<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sizzle & Drizzle | Doctor-Designed Taiwanese Lunch</title>
    <style>
        body { font-family: 'Segoe UI', sans-serif; max-width: 800px; margin: 0 auto; padding: 20px; background-color: #fafafa; }
        .discount-banner { background: #fff3cd; padding: 15px; border-radius: 10px; text-align: center; margin-bottom: 20px; border: 1px solid #ffeeba; }
        nav h1 { color: #d9534f; text-align: center; }
        .menu-category { margin-top: 30px; }
        .items-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(250px, 1fr)); gap: 20px; }
        .item-card { background: white; border: 1px solid #eee; padding: 20px; border-radius: 12px; box-shadow: 0 2px 5px rgba(0,0,0,0.05); }
        .price-tag { font-weight: bold; color: #d9534f; font-size: 1.2em; }
        button { cursor: pointer; background: #007bff; color: white; border: none; padding: 10px 15px; border-radius: 6px; }
        button:hover { background: #0056b3; }
        #group-order-summary { background: white; border: 2px dashed #007bff; padding: 20px; margin-top: 40px; border-radius: 10px; }
        #summary-text { background: #f8f9fa; padding: 15px; border: 1px solid #ddd; white-space: pre-wrap; font-family: monospace; }
        .copy-btn { background: #28a745; width: 100%; margin-top: 10px; font-size: 1.1em; }
    </style>
</head>
<body>
    <header>
        <div class="discount-banner">
            <p>🎓 Harvard Affiliate? Enter @harvard.edu email for 10% off!</p>
            <input type="email" id="user-email" placeholder="yourname@harvard.edu">
            <button onclick="window.applyDiscount()">Apply Discount</button>
        </div>
        <nav>
            <h1>Sizzle & Drizzle</h1>
        </nav>
    </header>

    <main id="menu-container">
        </main>

    <section id="group-order-summary" style="display:none;">
        <h3>🛒 Group Order Summary</h3>
        <pre id="summary-text"></pre>
        <button class="copy-btn" onclick="window.copySummary()">Copy for WhatsApp</button>
    </section>

    <script type="module" src="js/menu.js"></script>
    <script type="module" src="js/cart.js"></script>
</body>
</html>
