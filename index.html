<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sizzle & Drizzle | Doctor-Designed Taiwanese Cuisine</title>
    <style>
        /* Base Styles - Clean and Modern */
        body { font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif; margin: 0; padding: 0; color: #333; background-color: #fcfcfc; }
        
        .main-nav { 
            background: white; padding: 18px 40px; display: flex; justify-content: space-between; 
            align-items: center; position: sticky; top: 0; z-index: 1000; box-shadow: 0 1px 5px rgba(0,0,0,0.05); 
        }
        .main-nav .logo { font-size: 1.4rem; font-weight: 800; color: #d9534f; letter-spacing: -0.5px; }
        .main-nav a { text-decoration: none; color: #666; font-weight: 600; margin-left: 25px; font-size: 0.9rem; transition: 0.2s; }
        .main-nav a:hover, .main-nav a.active { color: #d9534f; }

        /* Promo Banner - American Consumer Style */
        .promo-banner { 
            background: #fff3cd; padding: 12px; text-align: center; border-bottom: 1px solid #ffeeba; 
            font-size: 0.95rem; color: #856404; font-weight: 500;
        }
        .promo-banner strong { color: #d9534f; font-weight: 700; }

        #menu-container { max-width: 1200px; margin: 0 auto; padding: 30px 20px; }
        .items-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(300px, 1fr)); gap: 30px; }
        
        /* Card UI */
        .item-card { background: white; border: 1px solid #eee; padding: 25px; border-radius: 12px; display: flex; flex-direction: column; transition: 0.3s ease; }
        .item-card:hover { box-shadow: 0 10px 20px rgba(0,0,0,0.05); }
        .item-card.out-of-stock { opacity: 0.5; filter: grayscale(1); pointer-events: none; }
        
        .nutrition-badge { display: inline-block; background-color: #f1f5f9; color: #475569; font-size: 10px; padding: 3px 10px; border-radius: 4px; border: 1px solid #e2e8f0; font-weight: 700; margin-right: 5px; margin-bottom: 5px; text-transform: uppercase; }
        .price-container { margin: 15px 0 10px 0; font-size: 1.1rem; }
        .discount-tag { background: #ffd7d7; color: #d9534f; font-size: 0.75rem; padding: 2px 6px; border-radius: 4px; margin-left: 5px; font-weight: bold; }
        
        .add-btn { background: #007bff; color: white; border: none; padding: 12px; border-radius: 6px; font-weight: bold; cursor: pointer; width: 100%; transition: 0.2s; }
        .add-btn:hover { background: #0056b3; }

        /* Order Summary Section */
        #group-order-summary { background: #fff; border: 2px dashed #007bff; padding: 30px; border-radius: 12px; margin: 40px auto; max-width: 800px; }
        #summary-text { background: #f8f9fa; padding: 20px; border-radius: 8px; font-family: 'Courier New', Courier, monospace; white-space: pre-wrap; font-size: 0.9rem; }
        .copy-btn { width: 100%; padding: 15px; background: #28a745; color: white; border: none; border-radius: 8px; font-weight: 700; cursor: pointer; font-size: 1rem; margin-top: 20px; }
    </style>
</head>
<body>

    <nav class="main-nav">
        <div class="logo">Sizzle & Drizzle</div>
        <div>
            <a href="index.html" class="active">Menu</a>
            <a href="science.html">The Science</a>
        </div>
    </nav>

    <div class="promo-banner">
        🎓 <strong>Campus Affiliate Discount:</strong> Show your Harvard ID at pickup for <strong>10% OFF</strong> your entire order!
    </div>

    <main id="menu-container">
        </main>

    <section id="group-order-summary" style="display:none;">
        <h3 style="margin-top:0; color: #d9534f;">📋 Order Summary</h3>
        <pre id="summary-text"></pre>
        <button onclick="window.copySummary()" class="copy-btn">Copy Order to Clipboard</button>
    </section>

    <script type="module" src="js/menu.js"></script>
    <script type="module" src="js/cart.js"></script>
</body>
</html>
