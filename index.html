<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Cambridge 健康中式餐盒 | 線上點餐</title>
    <style>
        body { font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; max-width: 600px; margin: 0 auto; padding: 20px; background-color: #f4f7f6; color: #333; }
        h1, h2 { color: #2c3e50; text-align: center; border-bottom: 2px solid #e0e0e0; padding-bottom: 10px; }
        .menu-category { margin-top: 20px; font-size: 1.2em; color: #e74c3c; font-weight: bold; border-bottom: 1px solid #ccc; padding-bottom: 5px; }
        .menu-item { background: white; padding: 15px; margin-top: 10px; border-radius: 8px; box-shadow: 0 4px 6px rgba(0,0,0,0.05); display: flex; justify-content: space-between; align-items: center; }
        .item-info { display: flex; flex-direction: column; width: 70%; }
        .item-name { font-weight: bold; font-size: 1.1em; }
        .item-tags { font-size: 0.75em; color: #27ae60; margin-top: 4px; }
        .item-price { font-size: 0.9em; color: #7f8c8d; margin-top: 4px; }
        .original-price { text-decoration: line-through; margin-right: 5px; color: #bdc3c7; }
        .order-section { background: white; padding: 20px; border-radius: 8px; margin-top: 30px; box-shadow: 0 4px 6px rgba(0,0,0,0.05); border-top: 4px solid #e74c3c; }
        input, select, button { padding: 12px; margin: 8px 0; border-radius: 6px; border: 1px solid #ccc; width: 100%; box-sizing: border-box; font-size: 1em; }
        button { background-color: #e74c3c; color: white; border: none; cursor: pointer; font-weight: bold; transition: 0.3s; }
        button:hover { background-color: #c0392b; }
        button:disabled { background-color: #bdc3c7; cursor: not-allowed; }
        .add-btn { width: auto; background-color: #27ae60; padding: 8px 15px; font-size: 0.9em; }
        .add-btn:hover { background-color: #2ecc71; }
        .add-btn:disabled { background-color: #bdc3c7; cursor: not-allowed; }
        #cart-items { list-style-type: none; padding: 0; }
        #cart-items li { border-bottom: 1px dashed #ccc; padding: 8px 0; display: flex; justify-content: space-between;}
        .total-line { font-weight: bold; font-size: 1.2em; text-align: right; margin-top: 15px; color: #e74c3c; }
        .loading { text-align: center; color: #7f8c8d; padding: 20px; }
    </style>
</head>
<body>

    <h1>Cambridge 健康中餐</h1>
    <p style="text-align: center; color: #7f8c8d;">哈佛周邊的高纖低脂選擇</p>

    <div id="menu-container">
        <div class="loading">正在從廚房載入最新菜單...</div>
    </div>

    <div class="order-section">
        <h2>您的訂單</h2>
        <ul id="cart-items">
            <li style="color: #95a5a6; justify-content: center;">購物車目前是空的</li>
        </ul>
        <div class="total-line">總計: $<span id="total-price">0</span></div>

        <h3 style="margin-top: 25px;">取餐與聯絡資訊</h3>
        
        <select id="pickup-time">
            <option value="">請選擇取餐時間...</option>
        </select>

        <input type="text" id="customer-name" placeholder="您的姓名 (必填)">
        <input type="text" id="customer-phone" placeholder="聯絡電話 (必填)">
        <button id="submit-order">確認送出訂單</button>
    </div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.1/firebase-app.js";
        import { getFirestore, collection, getDocs, addDoc, serverTimestamp, doc, getDoc } from "https://www.gstatic.com/firebasejs/10.8.1/firebase-firestore.js";

        // ⚠️ 請替換成你的 Firebase 設定 ⚠️
        const firebaseConfig = {
            apiKey: "請替換成你的_API_KEY",
            authDomain: "請替換成你的_PROJECT_ID.firebaseapp.com",
            projectId: "請替換成你的_PROJECT_ID",
            storageBucket: "請替換成你的_PROJECT_ID.appspot.com",
            messagingSenderId: "請替換成你的_SENDER_ID",
            appId: "請替換成你的_APP_ID"
        };

        const app = initializeApp(firebaseConfig);
        const db = getFirestore(app);

        // 狀態管理
        window.cart = [];
        window.total = 0;

        // 初始化執行
        async function initApp() {
            await loadMenu();
            await loadPickupSlots();
        }

        // --- 核心邏輯：載入菜單 ---
        async function loadMenu() {
            const container = document.getElementById('menu-container');
            container.innerHTML = ''; // 清除 Loading 文字

            // 【明確的範圍 for】：定義我們要去哪些集合抓資料
            const categories = [
                { path: 'menu/01_fresh_produce/items', title: '生鮮特選' },
                { path: 'menu/02_chinese_dishes/items', title: '健康熟食' }
            ];

            for (const cat of categories) {
                try {
                    const querySnapshot = await getDocs(collection(db, cat.path));
                    
                    if (!querySnapshot.empty) {
                        const catTitle = document.createElement('div');
                        catTitle.className = 'menu-category';
                        catTitle.textContent = cat.title;
                        container.appendChild(catTitle);

                        querySnapshot.forEach((doc) => {
                            const data = doc.data();
                            renderMenuItem(container, data, doc.id);
                        });
                    }
                } catch (error) {
                    console.error("讀取菜單失敗: ", error);
                }
            }
        }

        // --- 核心邏輯：渲染單一菜色 ---
        function renderMenuItem(container, data, id) {
            // 【嚴謹的邏輯 if】：計算折扣與價格
            let finalPrice = data.base_price;
            let priceHTML = `$${finalPrice}`;
            
            if (data.is_discounted) {
                finalPrice = data.base_price * data.discount_rate;
                priceHTML = `<span class="original-price">$${data.base_price}</span> <span style="color:#e74c3c; font-weight:bold;">$${finalPrice} (哈佛特惠)</span>`;
            }

            // 【抽象化】：將營養標籤轉化為可讀文字
            let tags = [];
            if(data.nutrition_tags) {
                if(data.nutrition_tags.Protein) tags.push("高蛋白");
                if(data.nutrition_tags.Fiber) tags.push("高纖");
                if(data.nutrition_tags.Starch) tags.push("澱粉");
                if(data.nutrition_tags['Fats / Lipids'] || data.nutrition_tags.Fats) tags.push("優質脂肪");
            }
            const tagsText = tags.length > 0 ? tags.join(" | ") : "";

            // 【周全的防禦 Boundary Check】：阻擋庫存為 0 的商品
            const isOutOfStock = data.stock <= 0;
            const btnHTML = isOutOfStock 
                ? `<button class="add-btn" disabled>已售完</button>`
                : `<button class="add-btn" onclick="addToCart('${data.name}', ${finalPrice})">+ 加入</button>`;

            const itemDiv = document.createElement('div');
            itemDiv.className = 'menu-item';
            itemDiv.innerHTML = `
                <div class="item-info">
                    <span class="item-name">${data.name}</span>
                    <span class="item-tags">${tagsText}</span>
                    <span class="item-price">${priceHTML}</span>
                </div>
                ${btnHTML}
            `;
            container.appendChild(itemDiv);
        }

        // --- 核心邏輯：載入取餐時段 ---
        async function loadPickupSlots() {
            const select = document.getElementById('pickup-time');
            try {
                const querySnapshot = await getDocs(collection(db, "pickup_slots"));
                
                // 【明確的範圍 for】：排序時段，確保下拉選單按照時間順序
                const slots = [];
                querySnapshot.forEach((doc) => slots.push({ id: doc.id, ...doc.data() }));
                slots.sort((a, b) => a.id.localeCompare(b.id)); 

                slots.forEach((slot) => {
                    // 【周全的防禦 Boundary Check】：只顯示 active 且未滿單的時段
                    if (slot.is_active && slot.current_booked < slot.max_capacity) {
                        const option = document.createElement('option');
                        option.value = slot.id; // 例如 "1000"
                        // 將 1000 格式化為 10:00 顯示
                        const timeDisplay = slot.id.substring(0,2) + ":" + slot.id.substring(2,4);
                        option.textContent = `${timeDisplay} (剩餘 ${slot.max_capacity - slot.current_booked} 份額度)`;
                        select.appendChild(option);
                    }
                });
            } catch (error) {
                console.error("讀取時段失敗: ", error);
            }
        }

        // --- 購物車與 UI 更新 ---
        window.addToCart = function(itemName, price) {
            window.cart.push({ name: itemName, price: price });
            window.total += price;
            updateCartUI();
        };

        function updateCartUI() {
            const cartList = document.getElementById('cart-items');
            const totalSpan = document.getElementById('total-price');
            cartList.innerHTML = ''; 
            
            if (window.cart.length === 0) {
                cartList.innerHTML = '<li style="color: #95a5a6; justify-content: center;">購物車目前是空的</li>';
            } else {
                window.cart.forEach(item => {
                    const li = document.createElement('li');
                    li.innerHTML = `<span>${item.name}</span> <span>$${item.price}</span>`;
                    cartList.appendChild(li);
                });
            }
            totalSpan.textContent = window.total;
        }

        // --- 送出訂單 ---
        document.getElementById('submit-order').addEventListener('click', async () => {
            const nameInput = document.getElementById('customer-name').value.trim();
            const phoneInput = document.getElementById('customer-phone').value.trim();
            const pickupTime = document.getElementById('pickup-time').value;
            const submitBtn = document.getElementById('submit-order');

            // 【周全的防禦 Boundary Check】
            if (window.cart.length === 0) { alert("請先加入餐點！"); return; }
            if (!pickupTime) { alert("請選擇取餐時間！"); return; }
            if (!nameInput || !phoneInput) { alert("請填寫姓名與電話！"); return; }

            submitBtn.disabled = true;
            submitBtn.textContent = "訂單傳送中...";

            try {
                const orderData = {
                    customer: nameInput,
                    phone: phoneInput,
                    pickup_slot: pickupTime,
                    items: window.cart,
                    totalAmount: window.total,
                    status: "new",
                    createdAt: serverTimestamp()
                };

                await addDoc(collection(db, "orders"), orderData);
                
                alert(`訂單成功送出！請於 ${pickupTime.substring(0,2)}:${pickupTime.substring(2,4)} 前往取餐。`);
                
                // 重置狀態
                window.cart = [];
                window.total = 0;
                updateCartUI();
                document.getElementById('customer-name').value = '';
                document.getElementById('customer-phone').value = '';
                document.getElementById('pickup-time').value = ''; // 重置下拉選單

            } catch (error) {
                console.error("送出訂單失敗: ", error);
                alert("系統異常，請稍後再試。");
            } finally {
                submitBtn.disabled = false;
                submitBtn.textContent = "確認送出訂單";
            }
        });

        // 啟動應用程式
        initApp();
    </script>
</body>
</html>
