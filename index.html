<!DOCTYPE html>
<html lang="en-US">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="description" content="SIZZLE & DRIZZLE in Cambridge. Data-driven, healthy Chinese cuisine near Harvard. Order fresh produce and chef's specials online.">
    <title>SIZZLE & DRIZZLE | Order Online</title>
    <style>
        body { font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; max-width: 600px; margin: 0 auto; padding: 20px; background-color: #f4f7f6; color: #333; }
        h1 { color: #2c3e50; text-align: center; margin-bottom: 5px; letter-spacing: 1px; }
        p.address { text-align: center; color: #7f8c8d; border-bottom: 2px solid #e0e0e0; padding-bottom: 15px; margin-top: 0; font-size: 0.9em; }
        
        /* 菜單分類標題 SEO 優化樣式 */
        .menu-category { margin-top: 25px; font-size: 1.3em; color: #e74c3c; font-weight: bold; border-bottom: 2px solid #e74c3c; padding-bottom: 5px; text-transform: uppercase; }
        
        /* 菜色卡片 */
        .menu-item { background: white; padding: 15px; margin-top: 15px; border-radius: 8px; box-shadow: 0 4px 6px rgba(0,0,0,0.05); display: flex; justify-content: space-between; align-items: flex-start; }
        .item-info { display: flex; flex-direction: column; width: 70%; }
        .item-name { font-weight: bold; font-size: 1.15em; margin: 0 0 5px 0; color: #2c3e50; }
        
        /* 營養素視覺化徽章 UI 優化 */
        .nutrient-badges { display: flex; gap: 6px; margin-top: 6px; flex-wrap: wrap; }
        .badge { padding: 3px 8px; border-radius: 12px; font-size: 0.7em; font-weight: bold; color: white; text-transform: uppercase; letter-spacing: 0.5px; }
        .badge.protein { background-color: #3498db; } /* 藍色代表蛋白質 */
        .badge.fiber { background-color: #2ecc71; } /* 綠色代表纖維 */
        .badge.starch { background-color: #f1c40f; color: #333; } /* 黃色代表澱粉/碳水 */
        .badge.fats { background-color: #e67e22; } /* 橘色代表優質脂肪 */
        
        .item-price { font-size: 0.95em; color: #34495e; margin-top: 8px; font-weight: 500; }
        .original-price { text-decoration: line-through; margin-right: 5px; color: #bdc3c7; font-weight: normal; }
        
        .order-section { background: white; padding: 20px; border-radius: 8px; margin-top: 35px; box-shadow: 0 4px 6px rgba(0,0,0,0.05); border-top: 4px solid #e74c3c; }
        input, select, button { padding: 12px; margin: 8px 0; border-radius: 6px; border: 1px solid #ccc; width: 100%; box-sizing: border-box; font-size: 1em; }
        button { background-color: #e74c3c; color: white; border: none; cursor: pointer; font-weight: bold; transition: 0.3s; }
        button:hover { background-color: #c0392b; }
        button:disabled { background-color: #bdc3c7; cursor: not-allowed; }
        .add-btn { width: auto; background-color: #27ae60; padding: 10px 15px; font-size: 0.9em; margin-top: 5px; }
        .add-btn:hover { background-color: #2ecc71; }
        .add-btn:disabled { background-color: #bdc3c7; cursor: not-allowed; }
        
        #cart-items { list-style-type: none; padding: 0; }
        #cart-items li { border-bottom: 1px dashed #ccc; padding: 8px 0; display: flex; justify-content: space-between;}
        .total-line { font-weight: bold; font-size: 1.2em; text-align: right; margin-top: 15px; color: #e74c3c; }
        .loading { text-align: center; color: #7f8c8d; padding: 20px; }
    </style>
</head>
<body>

    <header>
        <h1>SIZZLE & DRIZZLE</h1>
        <p class="address">1220 Massachusetts Ave, Cambridge</p>
    </header>

    <main id="menu-container">
        <div class="loading">Loading fresh menu from the kitchen...</div>
    </main>

    <section class="order-section">
        <h2>Your Order</h2>
        <ul id="cart-items">
            <li style="color: #95a5a6; justify-content: center;">Your cart is empty</li>
        </ul>
        <div class="total-line">Total: $<span id="total-price">0.00</span></div>

        <h3 style="margin-top: 25px;">Pickup Details</h3>
        <select id="pickup-time">
            <option value="">Select Pickup Time...</option>
        </select>

        <input type="text" id="customer-name" placeholder="Your Name (Required)">
        <input type="text" id="customer-phone" placeholder="Phone Number (Required)">
        <button id="submit-order">Submit Order</button>
    </section>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.1/firebase-app.js";
        import { getFirestore, collection, getDocs, addDoc, serverTimestamp } from "https://www.gstatic.com/firebasejs/10.8.1/firebase-firestore.js";

        // ⚠️ REPLACE THIS WITH YOUR FIREBASE CONFIG ⚠️
        const firebaseConfig = {
            apiKey: "YOUR_API_KEY",
            authDomain: "YOUR_PROJECT_ID.firebaseapp.com",
            projectId: "YOUR_PROJECT_ID",
            storageBucket: "YOUR_PROJECT_ID.appspot.com",
            messagingSenderId: "YOUR_SENDER_ID",
            appId: "YOUR_APP_ID"
        };

        const app = initializeApp(firebaseConfig);
        const db = getFirestore(app);

        window.cart = [];
        window.total = 0;

        async function initApp() {
            await loadMenu();
            await loadPickupSlots();
        }

        async function loadMenu() {
            const container = document.getElementById('menu-container');
            container.innerHTML = ''; 

            // 【明確的範圍】：將資料庫路徑對應到你指定的兩個大類別
            const categories = [
                { path: 'menu/01_fresh_produce/items', title: '1. Fresh Produce' },
                { path: 'menu/02_chinese_dishes/items', title: "2. Chef's Specials" }
            ];

            for (const cat of categories) {
                try {
                    const querySnapshot = await getDocs(collection(db, cat.path));
                    
                    if (!querySnapshot.empty) {
                        // SEO: 使用 <h2> 標籤讓爬蟲看懂架構
                        const catTitle = document.createElement('h2');
                        catTitle.className = 'menu-category';
                        catTitle.textContent = cat.title;
                        container.appendChild(catTitle);

                        querySnapshot.forEach((doc) => {
                            renderMenuItem(container, doc.data(), doc.id);
                        });
                    }
                } catch (error) {
                    console.error("Error loading menu: ", error);
                }
            }
        }

        function renderMenuItem(container, data, id) {
            let finalPrice = data.base_price;
            let priceHTML = `$${finalPrice.toFixed(2)}`;
            
            if (data.is_discounted) {
                finalPrice = data.base_price * data.discount_rate;
                priceHTML = `<span class="original-price">$${data.base_price.toFixed(2)}</span> <span style="color:#e74c3c; font-weight:bold;">$${finalPrice.toFixed(2)} (Harvard Special)</span>`;
            }

            // 【嚴謹的邏輯】：將 Boolean 轉化為直觀的色彩 Badge
            let tagsHTML = '<div class="nutrient-badges">';
            if(data.nutrition_tags) {
                if(data.nutrition_tags.Protein) tagsHTML += `<span class="badge protein">Protein</span>`;
                if(data.nutrition_tags.Fiber) tagsHTML += `<span class="badge fiber">Fiber</span>`;
                if(data.nutrition_tags.Starch) tagsHTML += `<span class="badge starch">Carbs</span>`;
                if(data.nutrition_tags['Fats / Lipids'] || data.nutrition_tags.Fats) tagsHTML += `<span class="badge fats">Fats</span>`;
            }
            tagsHTML += '</div>';

            const isOutOfStock = data.stock <= 0;
            const btnHTML = isOutOfStock 
                ? `<button class="add-btn" disabled>Sold Out</button>`
                : `<button class="add-btn" onclick="addToCart('${data.name}', ${finalPrice})">+ Add</button>`;

            // SEO: 使用 <article> 包裝單一菜色，標題用 <h3>
            const itemArticle = document.createElement('article');
            itemArticle.className = 'menu-item';
            itemArticle.innerHTML = `
                <div class="item-info">
                    <h3 class="item-name">${data.name}</h3>
                    ${tagsHTML}
                    <div class="item-price">${priceHTML}</div>
                </div>
                <div>${btnHTML}</div>
            `;
            container.appendChild(itemArticle);
        }

        async function loadPickupSlots() {
            const select = document.getElementById('pickup-time');
            
            const nowET = new Date(new Date().toLocaleString("en-US", {timeZone: "America/New_York"}));
            const currentHour = nowET.getHours();
            const currentMinute = nowET.getMinutes();
            const currentTimeStr = (currentHour < 10 ? '0' : '') + currentHour + (currentMinute < 10 ? '0' : '') + currentMinute;

            try {
                const querySnapshot = await getDocs(collection(db, "pickup_slots"));
                const slots = [];
                querySnapshot.forEach((doc) => slots.push({ id: doc.id, ...doc.data() }));
                slots.sort((a, b) => a.id.localeCompare(b.id)); 

                slots.forEach((slot) => {
                    const isAvailable = slot.is_active && slot.current_booked < slot.max_capacity;
                    const isFuture = slot.id > currentTimeStr;

                    if (isAvailable && isFuture) {
                        const option = document.createElement('option');
                        option.value = slot.id; 
                        
                        let hour = parseInt(slot.id.substring(0,2));
                        const min = slot.id.substring(2,4);
                        const ampm = hour >= 12 ? 'PM' : 'AM';
                        hour = hour % 12;
                        hour = hour ? hour : 12; 
                        const timeDisplay = `${hour}:${min} ${ampm}`;

                        option.textContent = `${timeDisplay} (${slot.max_capacity - slot.current_booked} slots left)`;
                        select.appendChild(option);
                    }
                });

                if (select.options.length === 1) {
                    select.options[0].textContent = "No available slots right now";
                }

            } catch (error) {
                console.error("Error loading time slots: ", error);
            }
        }

        window.addToCart = function(itemName, price) {
            window.cart.push({ name: itemName, price: price });
            window.total += price;
            updateCartUI();
        };

        function updateCartUI() {
            const cartList = document.getElementById('cart-items');
            const totalSpan = document.getElementById('total-price');
            cartList.innerHTML = ''; 
            
            if (window.cart.length === 0) {
                cartList.innerHTML = '<li style="color: #95a5a6; justify-content: center;">Your cart is empty</li>';
            } else {
                window.cart.forEach((item, index) => {
                    const li = document.createElement('li');
                    // 加上移除按鈕，提升購物車 UX
                    li.innerHTML = `
                        <span>${item.name}</span> 
                        <span>$${item.price.toFixed(2)} <button style="width:auto; padding: 2px 6px; margin-left:10px; font-size:0.8em; background:#95a5a6;" onclick="removeFromCart(${index}, ${item.price})">X</button></span>
                    `;
                    cartList.appendChild(li);
                });
            }
            totalSpan.textContent = window.total.toFixed(2);
        }

        // 新增：讓客人可以從購物車刪除不小心點錯的餐點 (防禦性 UX)
        window.removeFromCart = function(index, price) {
            window.cart.splice(index, 1);
            window.total -= price;
            updateCartUI();
        }

        document.getElementById('submit-order').addEventListener('click', async () => {
            const nameInput = document.getElementById('customer-name').value.trim();
            const phoneInput = document.getElementById('customer-phone').value.trim();
            const pickupTime = document.getElementById('pickup-time').value;
            const submitBtn = document.getElementById('submit-order');

            if (window.cart.length === 0) { alert("Please add items to your cart first!"); return; }
            if (!pickupTime) { alert("Please select a pickup time!"); return; }
            if (!nameInput || !phoneInput) { alert("Please enter your name and phone number!"); return; }

            submitBtn.disabled = true;
            submitBtn.textContent = "Sending Order...";

            try {
                const orderData = {
                    customer: nameInput,
                    phone: phoneInput,
                    pickup_slot: pickupTime,
                    items: window.cart,
                    totalAmount: window.total,
                    status: "new",
                    createdAt: serverTimestamp() 
                };

                await addDoc(collection(db, "orders"), orderData);
                
                alert(`Order submitted successfully! See you at ${pickupTime.substring(0,2)}:${pickupTime.substring(2,4)}.`);
                
                window.cart = [];
                window.total = 0;
                updateCartUI();
                document.getElementById('customer-name').value = '';
                document.getElementById('customer-phone').value = '';
                document.getElementById('pickup-time').value = ''; 

            } catch (error) {
                console.error("Order failed: ", error);
                alert("System error. Please try again later.");
            } finally {
                submitBtn.disabled = false;
                submitBtn.textContent = "Submit Order";
            }
        });

        initApp();
    </script>
</body>
</html>
