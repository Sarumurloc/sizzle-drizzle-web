<!DOCTYPE html>
<html lang="en-US">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Kitchen Dashboard | SIZZLE & DRIZZLE</title>
    <style>
        /* 廚房專用樣式：高對比、大字體、極簡化 */
        body { font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; margin: 0; padding: 20px; background-color: #1e272e; color: #ecf0f1; }
        h1 { text-align: center; color: #f1c40f; letter-spacing: 2px; border-bottom: 2px solid #34495e; padding-bottom: 10px; margin-top: 0; }
        
        /* 啟動營業按鈕 (突破音效限制) */
        #start-screen { display: flex; flex-direction: column; align-items: center; justify-content: center; height: 80vh; }
        .huge-btn { background-color: #27ae60; color: white; border: none; padding: 20px 40px; font-size: 2em; border-radius: 12px; cursor: pointer; font-weight: bold; box-shadow: 0 6px 0 #2ecc71; transition: 0.1s; }
        .huge-btn:active { transform: translateY(6px); box-shadow: none; }

        /* 訂單網格佈局 */
        #dashboard { display: none; }
        .order-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(320px, 1fr)); gap: 20px; margin-top: 20px; }
        
        /* 單筆訂單卡片 */
        .order-card { background-color: #2c3e50; border-left: 8px solid #e74c3c; border-radius: 8px; padding: 15px; box-shadow: 0 4px 10px rgba(0,0,0,0.3); display: flex; flex-direction: column; justify-content: space-between; }
        .order-header { display: flex; justify-content: space-between; border-bottom: 1px solid #34495e; padding-bottom: 10px; margin-bottom: 10px; }
        .pickup-time { font-size: 1.8em; font-weight: bold; color: #f1c40f; }
        .customer-info { font-size: 1em; color: #bdc3c7; text-align: right; }
        .customer-name { font-weight: bold; color: white; font-size: 1.2em; display: block; }
        
        /* 菜色清單 */
        .item-list { list-style: none; padding: 0; margin: 0 0 15px 0; flex-grow: 1; }
        .item-list li { font-size: 1.3em; padding: 8px 0; border-bottom: 1px dashed #7f8c8d; display: flex; justify-content: space-between; }
        .item-qty { font-weight: bold; color: #2ecc71; background: #1e272e; padding: 2px 10px; border-radius: 6px; }

        /* 完成按鈕 */
        .done-btn { background-color: #e74c3c; color: white; border: none; padding: 15px; font-size: 1.2em; border-radius: 6px; cursor: pointer; font-weight: bold; width: 100%; transition: 0.3s; }
        .done-btn:hover { background-color: #c0392b; }
        
        /* 系統狀態文字 */
        .status-text { text-align: center; color: #7f8c8d; margin-top: 20px; font-size: 1.1em; }
    </style>
</head>
<body>

    <div id="start-screen">
        <h2 style="color: #7f8c8d; margin-bottom: 30px;">Harvard Kitchen Terminal</h2>
        <button id="start-shift-btn" class="huge-btn">START SHIFT<br><span style="font-size: 0.5em; font-weight: normal;">(Enable Alerts & Connect)</span></button>
    </div>

    <div id="dashboard">
        <h1>👨‍🍳 KITCHEN LIVE ORDERS</h1>
        <div id="orders-container" class="order-grid">
            </div>
        <div id="empty-state" class="status-text">Listening for new orders...</div>
    </div>

    <audio id="alert-sound" src="data:audio/wav;base64,UklGRl9vT19XQVZFZm10IBAAAAABAAEAQB8AAEAfAAABAAgAZGF0YU... (略，我們用 Web Audio API 來動態合成聲音更乾淨)" preload="auto"></audio>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.1/firebase-app.js";
        // 引入 onSnapshot 來做即時監聽，引入 doc 和 updateDoc 來修改狀態
        import { getFirestore, collection, query, where, onSnapshot, doc, updateDoc } from "https://www.gstatic.com/firebasejs/10.8.1/firebase-firestore.js";

        // ⚠️ REPLACE THIS WITH YOUR REAL FIREBASE CONFIG ⚠️
        const firebaseConfig = {
            apiKey: "YOUR_API_KEY",
            authDomain: "YOUR_PROJECT_ID.firebaseapp.com",
            projectId: "YOUR_PROJECT_ID",
            storageBucket: "YOUR_PROJECT_ID.appspot.com",
            messagingSenderId: "YOUR_SENDER_ID",
            appId: "YOUR_APP_ID"
        };

        const app = initializeApp(firebaseConfig);
        const db = getFirestore(app);

        // 系統狀態
        let currentOrderCount = 0;
        let audioContext = null;

        // 【嚴謹的邏輯】：用瀏覽器原生 API 動態合成「叮咚」聲，免去外部音檔讀取失敗的風險
        function playAlertSound() {
            if (!audioContext) return;
            const oscillator = audioContext.createOscillator();
            const gainNode = audioContext.createGain();
            
            oscillator.type = 'sine';
            oscillator.frequency.setValueAtTime(880, audioContext.currentTime); // 音高 A5
            oscillator.frequency.exponentialRampToValueAtTime(440, audioContext.currentTime + 0.5); // 音高降到 A4
            
            gainNode.gain.setValueAtTime(1, audioContext.currentTime);
            gainNode.gain.exponentialRampToValueAtTime(0.01, audioContext.currentTime + 0.5);
            
            oscillator.connect(gainNode);
            gainNode.connect(audioContext.destination);
            
            oscillator.start();
            oscillator.stop(audioContext.currentTime + 0.5);
        }

        // 點擊 Start Shift 後執行的主程式
        document.getElementById('start-shift-btn').addEventListener('click', () => {
            // 1. 解鎖音效權限
            audioContext = new (window.AudioContext || window.webkitAudioContext)();
            
            // 2. 切換畫面
            document.getElementById('start-screen').style.display = 'none';
            document.getElementById('dashboard').style.display = 'block';

            // 3. 啟動 Firebase 即時監聽
            startListeningForOrders();
        });

        function startListeningForOrders() {
            // 【明確的範圍】：我們只抓取 status 為 "new" (未處理) 的訂單
            const q = query(collection(db, "orders"), where("status", "==", "new"));

            // onSnapshot 會在資料庫有任何變動時「自動」觸發
            onSnapshot(q, (snapshot) => {
                const container = document.getElementById('orders-container');
                const emptyState = document.getElementById('empty-state');
                
                // 【周全的防禦】：判斷是不是有「新」訂單進來，有才發出聲音
                if (snapshot.docs.length > currentOrderCount && currentOrderCount !== 0) {
                    playAlertSound();
                }
                currentOrderCount = snapshot.docs.length;

                container.innerHTML = ''; // 清空現有畫面

                if (snapshot.empty) {
                    emptyState.style.display = 'block';
                    emptyState.textContent = "All caught up! Waiting for new orders...";
                    return;
                }

                emptyState.style.display = 'none';

                // 將所有訂單抓出來，並按照取餐時間排序
                let orders = [];
                snapshot.forEach((doc) => {
                    orders.push({ id: doc.id, ...doc.data() });
                });
                orders.sort((a, b) => a.pickup_slot.localeCompare(b.pickup_slot));

                // 渲染每筆訂單卡片
                orders.forEach((order) => {
                    // 格式化取餐時間 (例如 1330 轉成 1:30 PM)
                    let hour = parseInt(order.pickup_slot.substring(0,2));
                    const min = order.pickup_slot.substring(2,4);
                    const ampm = hour >= 12 ? 'PM' : 'AM';
                    hour = hour % 12;
                    hour = hour ? hour : 12; 
                    const timeDisplay = `${hour}:${min} ${ampm}`;

                    // 渲染菜色清單
                    let itemsHTML = '';
                    order.items.forEach(item => {
                        itemsHTML += `<li><span>${item.name}</span> <span class="item-qty">x ${item.quantity}</span></li>`;
                    });

                    const card = document.createElement('div');
                    card.className = 'order-card';
                    card.innerHTML = `
                        <div>
                            <div class="order-header">
                                <span class="pickup-time">${timeDisplay}</span>
                                <div class="customer-info">
                                    <span class="customer-name">${order.customer}</span>
                                    ${order.phone}
                                </div>
                            </div>
                            <ul class="item-list">
                                ${itemsHTML}
                            </ul>
                        </div>
                        <button class="done-btn" onclick="markOrderDone('${order.id}')">✔️ Mark as Done</button>
                    `;
                    container.appendChild(card);
                });
            }, (error) => {
                console.error("即時監聽發生錯誤: ", error);
                alert("Connection lost. Please refresh the page.");
            });
        }

        // 【嚴謹的邏輯】：將訂單狀態改為 completed
        window.markOrderDone = async function(orderId) {
            try {
                const orderRef = doc(db, "orders", orderId);
                // 這裡只更新 status 欄位，不影響其他資料
                await updateDoc(orderRef, {
                    status: "completed"
                });
                // 注意：我們不需要寫代碼去「刪除畫面上的卡片」。
                // 因為資料庫狀態一變，onSnapshot 會瞬間重新觸發，那張卡片會自動消失！
            } catch (error) {
                console.error("Error updating order: ", error);
                alert("Failed to update order status.");
            }
        };
    </script>
</body>
</html>
